<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream with Watch Together</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 20px;
            background: #111;
            color: #eee;
        }
        video {
            width: 100%;
            max-height: 80vh;
            background: black;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            font-size: 1rem;
            cursor: pointer;
        }
        .status {
            font-family: monospace;
            font-size: 0.9rem;
            margin-left: auto;
        }
        .latency-badge {
            font-family: monospace;
            font-size: 0.8rem;
            color: #aaa;
            margin-left: 10px;
        }
        .viewer-panel {
            margin-top: 20px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .viewer-panel h4 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            color: #aaa;
        }
        .viewer-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .viewer-tag {
            background: #2d2d44;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.75rem;
        }
        .viewer-tag .ip {
            color: #8bc34a;
        }
        .viewer-tag .ping {
            color: #ffb74d;
        }
        .viewer-tag.self {
            background: #3d2e4a;
            border-left: 2px solid #ff9800;
        }
    </style>
</head>
<body>
    <video id="videoPlayer" controls width="100%">
        <source src="{{ url_for('stream_file', file_id=file_id) }}" type="{{ mimetype }}">
        Your browser does not support the video tag.
    </video>
    <div class="controls">
        <button id="playBtn">▶ Play</button>
        <button id="pauseBtn">⏸ Pause</button>
        <button id="syncBtn">🔄 Force Sync</button>
        <span class="status" id="syncStatus">🟢 Synced</span>
        <span class="latency-badge" id="latencyInfo"></span>
    </div>

    <div class="viewer-panel" id="viewerPanel" style="display: none;">
        <h4>👥 Viewers (<span id="viewerCount">0</span>)</h4>
        <div id="viewerList" class="viewer-list">
            <span style="color:#666;">Loading...</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const fileId = {{ file_id }};
        
        // State variables
        let syncing = false;
        let isCorrecting = false;
        let lastSentAction = null;
        let lastSentPosition = null;
        let lastSentTime = 0;
        let lastServerState = null;
        let clientLatency = 50;
        let heartbeatInterval = null;
        let seekTimeout = null;
        
        // Configuration
        const POLL_INTERVAL = 3000;
        const SEEK_THRESHOLD = 2.0;
        const DRIFT_CORRECTION = 1.5;
        
        // Helper: fetch current watch state
        async function fetchWatchState() {
            const startTime = Date.now();
            try {
                const resp = await fetch(`/watch/state/${fileId}`);
                if (!resp.ok) throw new Error('State fetch failed');
                
                const rtt = Date.now() - startTime;
                clientLatency = clientLatency * 0.7 + (rtt / 2) * 0.3;
                document.getElementById('latencyInfo').innerHTML = `📡 ${Math.round(clientLatency)}ms`;
                
                const state = await resp.json();
                lastServerState = state;
                applyServerState(state);
            } catch (err) {
                console.warn('Poll error:', err);
                document.getElementById('syncStatus').innerHTML = '⚠️ Connection issue';
            }
        }
        
        // Calculate effective position with interpolation
        function getEffectivePosition(state, nowSec = null) {
            if (!nowSec) nowSec = Date.now() / 1000;
            if (state.playing && state.updated_at) {
                const elapsed = Math.max(0, nowSec - state.updated_at);
                return state.position + elapsed;
            }
            return state.position;
        }
        
        // Apply server state to local video
        function applyServerState(state) {
            if (syncing || isCorrecting) return;
            
            const nowSec = Date.now() / 1000;
            let targetPosition = getEffectivePosition(state, nowSec);
            const currentPosition = video.currentTime;
            const difference = targetPosition - currentPosition;
            
            let shouldSeek = false;
            let seekReason = '';
            
            if (Math.abs(difference) > SEEK_THRESHOLD) {
                shouldSeek = true;
                seekReason = `big drift ${difference.toFixed(2)}s`;
            } else if (state.playing && Math.abs(difference) > DRIFT_CORRECTION) {
                shouldSeek = true;
                seekReason = `drift ${difference.toFixed(2)}s`;
            } else if (!state.playing && Math.abs(difference) > 0.5) {
                shouldSeek = true;
                seekReason = `paused drift ${difference.toFixed(2)}s`;
            }
            
            if (shouldSeek && targetPosition >= 0) {
                isCorrecting = true;
                video.currentTime = targetPosition;
                document.getElementById('syncStatus').innerHTML = `🎬 Syncing (${seekReason})`;
                setTimeout(() => {
                    isCorrecting = false;
                    if (!syncing) document.getElementById('syncStatus').innerHTML = '🟢 Synced';
                }, 500);
            }
            
            // Sync play/pause (but don't trigger play/pause events that cause feedback)
            if (state.playing && video.paused) {
                video.play().catch(e => console.log('autoplay blocked:', e));
                if (!shouldSeek) document.getElementById('syncStatus').innerHTML = '▶️ Playing';
            } else if (!state.playing && !video.paused) {
                video.pause();
                if (!shouldSeek) document.getElementById('syncStatus').innerHTML = '⏸ Paused';
            }
        }
        
        // Send action to server (single definition)
        async function sendAction(action, position = null) {
            if (syncing || isCorrecting) return;
            
            const now = Date.now();
            if (now - lastSentTime < 200 && action === 'seek') return;
            if (lastSentAction === action && 
                (action !== 'seek' || Math.abs(lastSentPosition - position) < 0.3)) return;
            
            syncing = true;
            lastSentAction = action;
            lastSentPosition = position;
            lastSentTime = now;
            
            const payload = { action, latency: Math.round(clientLatency) };
            if (position !== null) payload.position = position;
            
            try {
                await fetch(`/watch/action/${fileId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.warn('Action error:', err);
            }
            
            syncing = false;
        }
        
        // Fetch active viewers
        async function fetchViewers() {
            try {
                const resp = await fetch(`/watch/viewers/${fileId}`);
                if (!resp.ok) throw new Error('Viewer fetch failed');
                const data = await resp.json();
                
                document.getElementById('viewerCount').innerHTML = data.count;
                const viewerList = document.getElementById('viewerList');
                const viewerPanel = document.getElementById('viewerPanel');
                
                if (data.count > 0) {
                    viewerPanel.style.display = 'block';
                    viewerList.innerHTML = data.viewers.map(v => {
                        const shortIp = v.ip.replace('::ffff:', '').replace('::1', 'localhost');
                        return `<div class="viewer-tag">
                                    <span class="ip">${shortIp}</span>
                                    <span class="ping">📡 ${v.latency}ms</span>
                                </div>`;
                    }).join('');
                } else {
                    viewerPanel.style.display = 'none';
                }
            } catch (err) {
                console.warn('Viewer fetch error:', err);
            }
        }
        
        // Debounced seek handler
        function handleSeek() {
            if (seekTimeout) clearTimeout(seekTimeout);
            seekTimeout = setTimeout(() => {
                if (!syncing && !isCorrecting) {
                    sendAction('seek', video.currentTime);
                }
            }, 100);
        }
        
        // Heartbeat while playing
        function startHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => {
                if (!video.paused && !syncing && !isCorrecting) {
                    sendAction('seek', video.currentTime);
                }
            }, 10000);
        }
        
        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
        }
        
        // Event listeners
        video.addEventListener('play', () => {
            if (!syncing && !isCorrecting) {
                sendAction('play', video.currentTime);
            }
            startHeartbeat();
        });
        
        video.addEventListener('pause', () => {
            if (!syncing && !isCorrecting) {
                sendAction('pause', video.currentTime);
            }
            stopHeartbeat();
        });
        
        video.addEventListener('seeked', handleSeek);
        
        // Manual buttons
        document.getElementById('playBtn').addEventListener('click', () => {
            if (!syncing && !isCorrecting) video.play();
        });
        
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (!syncing && !isCorrecting) video.pause();
        });

        // Force sync button
        document.getElementById('syncBtn').addEventListener('click', async () => {
            if (syncing || isCorrecting) return;

            try {
                const resp = await fetch(`/watch/sync/${fileId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!resp.ok) throw new Error('Sync failed');

                const data = await resp.json();

                // Immediately apply the synced position
                isCorrecting = true;
                video.currentTime = data.position;

                if (data.playing && video.paused) {
                    video.play();
                } else if (!data.playing && !video.paused) {
                    video.pause();
                }

                document.getElementById('syncStatus').innerHTML = '🔄 Force synced!';
                setTimeout(() => {
                    isCorrecting = false;
                    document.getElementById('syncStatus').innerHTML = '🟢 Synced';
                }, 1000);

            } catch (err) {
                console.warn('Force sync error:', err);
                document.getElementById('syncStatus').innerHTML = '⚠️ Sync failed';
                setTimeout(() => {
                    if (!syncing) document.getElementById('syncStatus').innerHTML = '🟢 Synced';
                }, 2000);
            }
        });
        
        // Start polling
        setInterval(fetchWatchState, POLL_INTERVAL);
        setInterval(fetchViewers, 3000);
        setTimeout(fetchWatchState, 500);
    </script>
</body>
</html>
