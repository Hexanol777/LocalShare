<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream with Watch Together</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 20px;
            background: #111;
            color: #eee;
        }
        video {
            width: 100%;
            max-height: 80vh;
            background: black;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            font-size: 1rem;
            cursor: pointer;
        }
        .status {
            font-family: monospace;
            font-size: 0.9rem;
            margin-left: auto;
        }
        .latency-badge {
            font-family: monospace;
            font-size: 0.8rem;
            color: #aaa;
            margin-left: 10px;
        }
        .viewer-panel {
            margin-top: 20px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .viewer-panel h4 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            color: #aaa;
        }
        .viewer-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .viewer-tag {
            background: #2d2d44;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.75rem;
        }
        .viewer-tag .ip {
            color: #8bc34a;
        }
        .viewer-tag .ping {
            color: #ffb74d;
        }
    </style>
</head>
<body>
    <video id="videoPlayer" controls width="100%">
        <source src="{{ url_for('stream_file', file_id=file_id) }}" type="{{ mimetype }}">
        Your browser does not support the video tag.
    </video>
    <div class="controls">
        <button id="playBtn">▶ Play</button>
        <button id="pauseBtn">⏸ Pause</button>
        <button id="syncBtn">🔄 Sync Now</button>
        <span class="status" id="syncStatus">🟢 Synced</span>
        <span class="latency-badge" id="latencyInfo"></span>
    </div>

    <div class="viewer-panel" id="viewerPanel" style="display: none;">
        <h4>👥 Viewers (<span id="viewerCount">0</span>)</h4>
        <div id="viewerList" class="viewer-list">
            <span style="color:#666;">Loading...</span>
        </div>
    </div>

    <script>
        const socket = io();
        const video = document.getElementById('videoPlayer');
        const fileId = {{ file_id }};

        let syncing = false;
        let isCorrecting = false;
        let lastSeq = -1;
        let correctionTimeout = null;
        let seekDebounce = null;
        let clientLatency = 50;
        let lastServerState = null;

        const SOFT_DRIFT = 0.35;
        const HARD_DRIFT = 0.90;

        // Join watch room
        socket.emit('join_watch', {
            file_id: fileId
        });

        function getTargetPosition(state) {
            const now = state.server_now;

            if (state.playing) {
                return state.position + (Date.now() / 1000 - now);
            }

            return state.position;
        }

        function resetPlaybackRate() {
            video.playbackRate = 1.0;
        }

        function applyState(state) {
            if (state.seq <= lastSeq) {
                return;
            }

            lastSeq = state.seq;
            lastServerState = state;

            if (syncing || isCorrecting) {
                return;
            }

            const target = getTargetPosition(state);
            const current = video.currentTime;
            const diff = target - current;

            // Hard seek for major desync
            if (Math.abs(diff) > HARD_DRIFT) {
                isCorrecting = true;
                video.currentTime = Math.max(0, target);

                clearTimeout(correctionTimeout);
                correctionTimeout = setTimeout(() => {
                    isCorrecting = false;
                }, 300);

                document.getElementById('syncStatus').innerHTML = '🎬 Hard sync';
                setTimeout(() => {
                    if (!syncing) document.getElementById('syncStatus').innerHTML = '🟢 Synced';
                }, 500);

            } 
            // Soft drift correction using playbackRate
            else if (Math.abs(diff) > SOFT_DRIFT && state.playing) {
                if (diff > 0) {
                    video.playbackRate = 1.05;
                } else {
                    video.playbackRate = 0.95;
                }

                clearTimeout(correctionTimeout);
                correctionTimeout = setTimeout(() => {
                    resetPlaybackRate();
                }, 1200);

                document.getElementById('syncStatus').innerHTML = `🎯 Drift ${diff.toFixed(2)}s`;
            } 
            else {
                resetPlaybackRate();
                if (!isCorrecting) {
                    document.getElementById('syncStatus').innerHTML = '🟢 Synced';
                }
            }

            // Sync play/pause state
            if (state.playing && video.paused) {
                video.play().catch(e => console.log('autoplay blocked:', e));
            }

            if (!state.playing && !video.paused) {
                video.pause();
            }
        }

        socket.on('watch_update', applyState);

        async function sendAction(action) {
            if (syncing || isCorrecting) {
                return;
            }

            syncing = true;

            try {
                await fetch(`/watch/action/${fileId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: action,
                        position: video.currentTime,
                        latency: Math.round(clientLatency)
                    })
                });
            } catch (e) {
                console.warn('Action error:', e);
            }

            syncing = false;
        }

        // Fetch viewers periodically (still needed for viewer list)
        async function fetchViewers() {
            try {
                const resp = await fetch(`/watch/viewers/${fileId}`);
                if (!resp.ok) throw new Error('Viewer fetch failed');
                const data = await resp.json();

                document.getElementById('viewerCount').innerHTML = data.count;
                const viewerList = document.getElementById('viewerList');
                const viewerPanel = document.getElementById('viewerPanel');

                if (data.count > 0) {
                    viewerPanel.style.display = 'block';
                    viewerList.innerHTML = data.viewers.map(v => {
                        const shortIp = v.ip.replace('::ffff:', '').replace('::1', 'localhost');
                        return `<div class="viewer-tag">
                                    <span class="ip">${shortIp}</span>
                                    <span class="ping">📡 ${v.latency}ms</span>
                                </div>`;
                    }).join('');
                } else {
                    viewerPanel.style.display = 'none';
                }
            } catch (err) {
                console.warn('Viewer fetch error:', err);
            }
        }

        // Measure latency via fetch (fallback when WebSocket not used)
        async function measureLatency() {
            const start = Date.now();
            try {
                await fetch(`/watch/viewers/${fileId}`);
                const rtt = Date.now() - start;
                clientLatency = clientLatency * 0.7 + (rtt / 2) * 0.3;
                document.getElementById('latencyInfo').innerHTML = `📡 ${Math.round(clientLatency)}ms`;
            } catch (e) {
                // Keep existing latency
            }
        }

        // Force sync button
        document.getElementById('syncBtn').addEventListener('click', async () => {
            if (syncing || isCorrecting) return;

            // Force a hard sync by sending a seek to current position
            await sendAction('seek', video.currentTime);
            
            document.getElementById('syncStatus').innerHTML = '🔄 Force sync sent';
            setTimeout(() => {
                if (!syncing) document.getElementById('syncStatus').innerHTML = '🟢 Synced';
            }, 1000);
        });

        // Video event listeners
        video.addEventListener('play', () => {
            sendAction('play');
        });

        video.addEventListener('pause', () => {
            sendAction('pause');
        });

        video.addEventListener('seeked', () => {
            if (seekDebounce) {
                clearTimeout(seekDebounce);
            }

            seekDebounce = setTimeout(() => {
                sendAction('seek');
            }, 120);
        });

        // Manual buttons
        document.getElementById('playBtn').addEventListener('click', () => {
            if (!syncing && !isCorrecting) video.play();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (!syncing && !isCorrecting) video.pause();
        });

        // Periodic tasks
        setInterval(fetchViewers, 3000);
        setInterval(measureLatency, 5000);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            resetPlaybackRate();
        });
    </script>
</body>
</html>
