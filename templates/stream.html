<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream – LocalShare</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
    <a href="{{ url_for('files.browse') }}">← Browse</a>
    <span class="topbar-title">{{ file_name }}</span>
    <span></span>
</div>

<!-- PLAYER -->
<div class="player-wrap">
    <video id="videoPlayer" controls>
        {# TS files: mpegts.js attaches the source — no <source> tag needed #}
        {% if mimetype != 'video/mp2t' %}
        <source src="{{ url_for('files.stream_file', file_id=file_id) }}" type="{{ mimetype }}">
        {% endif %}
    </video>
</div>

<!-- CONTROLS -->
<div class="stream-controls">
    <button class="ctrl-btn" id="playBtn">▶ Play</button>
    <button class="ctrl-btn" id="pauseBtn">⏸ Pause</button>
    <button class="ctrl-btn" id="syncBtn">🔄 Sync</button>
    <span class="sync-status" id="syncStatus">🟢 Synced</span>
    <span class="latency-badge" id="latencyInfo"></span>
</div><!-- /.stream-controls -->

<!-- VIEWER PANEL -->
<div class="viewer-panel" id="viewerPanel" style="display:none;">
    <h4>👥 Viewers (<span id="viewerCount">0</span>)</h4>
    <div id="viewerList" class="viewer-list">
        <span style="color:#555;">Loading...</span>
    </div>
</div>

<script>
// ============================================================
// initPlayer is defined HERE — before the mpegts loader IIFE
// below can possibly call it. This eliminates the race condition
// that was causing TS playback to silently fail.
// ============================================================
function initPlayer() {
    const video  = document.getElementById('videoPlayer');
    const fileId = {{ file_id }};
    const socket = io();

    // ---------- TS: wire up mpegts.js ----------
    {% if mimetype == 'video/mp2t' %}
    if (typeof mpegts !== 'undefined' && mpegts.getFeatureList().mseLivePlayback) {
        const player = mpegts.createPlayer({
            type:   'mpegts',
            isLive: false,
            url:    "{{ url_for('files.stream_file', file_id=file_id) }}"
        });
        player.attachMediaElement(video);
        player.load();
    } else {
        console.error('mpegts loaded but MSE is unavailable in this browser.');
    }
    {% endif %}

    // ============================================================
    // WATCH TOGETHER
    // ============================================================

    let syncing         = false;
    let isCorrecting    = false;
    let suppressEvents  = false;
    let lastSeq         = -1;
    let seekDebounce    = null;
    let heartbeatInterval = null;
    let serverTimeOffset  = 0;

    const SOFT_DRIFT         = 0.35;
    const HARD_DRIFT_PLAYING = 1.2;
    const HARD_DRIFT_PAUSED  = 0.15;
    const HEARTBEAT_MS       = 4000;

    function getTargetPosition(state) {
        const elapsed = (state.server_now + serverTimeOffset) - state.updated_at;
        return state.playing ? state.position + elapsed : state.position;
    }

    function applyPlaybackRateCorrection(diff) {
        if (Math.abs(diff) <= SOFT_DRIFT) {
            if (video.playbackRate !== 1.0) video.playbackRate = 1.0;
            return;
        }
        const correction = Math.min(Math.abs(diff) * 0.08, 0.04);
        let rate = diff > 0 ? 1.0 + correction : 1.0 - correction;
        rate = Math.min(Math.max(rate, 0.92), 1.08);
        if (Math.abs(video.playbackRate - rate) > 0.005) video.playbackRate = rate;
    }

    function applyState(state) {
        if (state.seq <= lastSeq || syncing || isCorrecting) return;
        lastSeq = state.seq;

        const target = getTargetPosition(state);
        const diff   = Math.min(Math.max(target - video.currentTime, -5), 5);

        const hardThreshold = !state.playing ? HARD_DRIFT_PAUSED : HARD_DRIFT_PLAYING;
        let needsHard = Math.abs(diff) > hardThreshold;
        if (state.playing && Math.abs(diff) < 0.5) needsHard = false;

        const statusEl = document.getElementById('syncStatus');

        if (needsHard) {
            suppressEvents = true;
            isCorrecting   = true;

            function onSeeked() {
                video.removeEventListener('seeked', onSeeked);
                clearTimeout(fallback);
                isCorrecting = suppressEvents = false;
                statusEl.textContent = '🟢 Synced';
            }
            const fallback = setTimeout(onSeeked, 1500);
            video.addEventListener('seeked', onSeeked);

            video.currentTime = Math.max(0, target);
            statusEl.textContent = `🎬 Hard sync (${diff.toFixed(2)}s)`;
        } else {
            applyPlaybackRateCorrection(diff);
            if (Math.abs(diff) > 0.1) {
                statusEl.textContent = `🎯 Drift ${diff.toFixed(2)}s`;
            } else if (statusEl.textContent.includes('Drift')) {
                statusEl.textContent = '🟢 Synced';
            }
        }

        if (state.playing && video.paused && !suppressEvents) {
            suppressEvents = true;
            video.play()
                .catch(e => console.log('autoplay blocked:', e))
                .finally(() => setTimeout(() => { suppressEvents = false; }, 80));
        } else if (!state.playing && !video.paused && !suppressEvents) {
            suppressEvents = true;
            video.pause();
            setTimeout(() => { suppressEvents = false; }, 80);
        }
    }

    // ---------- Socket ----------
    socket.on('watch_update', (state) => {
        const rawOffset  = state.server_now - (Date.now() / 1000);
        serverTimeOffset = serverTimeOffset * 0.9 + rawOffset * 0.1;
        document.getElementById('latencyInfo').textContent =
            `📡 ${Math.round(Math.abs(rawOffset) * 2000)}ms`;
        applyState(state);
    });

    // ---------- Actions ----------
    async function sendAction(action, position = null) {
        if (syncing || isCorrecting) return;
        syncing = true;
        const payload = { action, client_time: Date.now() / 1000 };
        if (position !== null) payload.position = position;
        try {
            await fetch(`/watch/action/${fileId}`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });
        } catch (err) { console.warn('Action error:', err); }
        syncing = false;
    }

    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
            if (!video.paused && !syncing && !isCorrecting)
                sendAction('heartbeat', video.currentTime);
        }, HEARTBEAT_MS);
    }

    function stopHeartbeat() {
        clearInterval(heartbeatInterval);
        heartbeatInterval = null;
    }

    // ---------- Video events ----------
    video.addEventListener('play',   () => { if (!suppressEvents) { sendAction('play',  video.currentTime); startHeartbeat(); } });
    video.addEventListener('pause',  () => { if (!suppressEvents) { sendAction('pause', video.currentTime); stopHeartbeat();  } });
    video.addEventListener('seeked', () => {
        if (seekDebounce) clearTimeout(seekDebounce);
        if (!suppressEvents)
            seekDebounce = setTimeout(() => sendAction('seek', video.currentTime), 120);
    });

    // ---------- Manual controls ----------
    document.getElementById('playBtn').addEventListener('click',  () => { if (!syncing && !isCorrecting) video.play(); });
    document.getElementById('pauseBtn').addEventListener('click', () => { if (!syncing && !isCorrecting) video.pause(); });
    document.getElementById('syncBtn').addEventListener('click',  () => {
        if (syncing || isCorrecting) return;
        sendAction('seek', video.currentTime);
        const s = document.getElementById('syncStatus');
        s.textContent = '🔄 Force sync sent';
        setTimeout(() => { if (!syncing) s.textContent = '🟢 Synced'; }, 1000);
    });

    // ---------- Viewer list ----------
    async function fetchViewers() {
        try {
            const data = await (await fetch(`/watch/viewers/${fileId}`)).json();
            const panel = document.getElementById('viewerPanel');
            document.getElementById('viewerCount').textContent = data.count;
            if (data.count > 0) {
                panel.style.display = 'block';
                document.getElementById('viewerList').innerHTML = data.viewers.map(v => {
                    const ip = v.ip.replace('::ffff:', '').replace('::1', 'localhost');
                    return `<div class="viewer-tag"><span class="ip">${ip}</span><span class="ping">📡 ${v.latency}ms</span></div>`;
                }).join('');
            } else {
                panel.style.display = 'none';
            }
        } catch (e) { console.warn('Viewer fetch error:', e); }
    }
    setInterval(fetchViewers, 3000);
    fetchViewers();

    // ---------- Init ----------
    socket.emit('join_watch', { file_id: fileId });
    window.addEventListener('beforeunload', () => {
        clearInterval(heartbeatInterval);
        video.playbackRate = 1.0;
    });
}
// ============================================================
// END initPlayer
// ============================================================


// ============================================================
// LOADER CHAIN
// socket.io must be fully loaded before initPlayer() runs because
// initPlayer() calls io() on its first line.
// /socket.io/ is Flask-SocketIO's transport namespace, NOT a static
// file path — requesting socket.io.js from there returns 400.
// Use local static file first, CDN as fallback.
// ============================================================
(function () {
    function inject(src, ok, fail) {
        var s = document.createElement('script');
        s.src = src; s.onload = ok; s.onerror = fail;
        document.head.appendChild(s);
    }

    var SIO_LOCAL = "{{ url_for('static', filename='socket.io.min.js') }}";
    var SIO_CDN   = 'https://cdn.socket.io/4.7.5/socket.io.min.js';

    function afterSocketIO() {
        {% if mimetype == 'video/mp2t' %}
        // TS: also need mpegts.js before initialising the player
        var MPEGTS_LOCAL = "{{ url_for('static', filename='mpegts.min.js') }}";
        var MPEGTS_CDN   = 'https://cdn.jsdelivr.net/npm/mpegts.js/dist/mpegts.min.js';

        inject(MPEGTS_LOCAL, initPlayer, function () {
            console.warn('mpegts.js not in /static/ — falling back to CDN');
            inject(MPEGTS_CDN, initPlayer, function () {
                console.error('mpegts.js failed to load from all sources.');
            });
        });
        {% else %}
        // Non-TS: socket.io is all we need
        initPlayer();
        {% endif %}
    }

    inject(SIO_LOCAL, afterSocketIO, function () {
        console.warn('socket.io.min.js not in /static/ — falling back to CDN');
        inject(SIO_CDN, afterSocketIO, function () {
            console.error('socket.io failed to load from all sources. Watch Together will not work.');
        });
    });
})();
</script>

</body>
</html>
