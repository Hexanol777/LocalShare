<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – LocalShare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header-box">
        <h1>Dashboard</h1>
        <div class="header-actions">
            <span class="admin-badge">Admin</span>
            <a class="nav-pill" href="{{ url_for('dashboard.dashboard') }}">Dashboard</a>
            <a class="nav-pill" href="{{ url_for('files.browse') }}">← Browse</a>
            <a class="nav-pill nav-pill-logout" href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </div>

    <!-- STAT CARDS -->
    <div class="dash-grid">

        <!-- CPU DASH CARD -->
        <div class="dash-card">
            <div class="dash-card-body">
                <div class="dash-card-label">CPU</div>
                <div class="dash-card-value" id="cpu-val">—</div>
                <div class="dash-card-sub">% of total system capacity</div>
            </div>
            <div class="dash-progress">
                <div class="dash-fill dash-fill-cpu" id="cpu-bar" style="width:0%"></div>
            </div>
        </div>

        <!-- MEMORY DASH CARD -->
        <div class="dash-card">
            <div class="dash-card-body">
                <div class="dash-card-label">Memory</div>
                <div class="dash-card-value" id="ram-val">—</div>
                <div class="dash-card-sub" id="ram-sub"></div>
            </div>
            <div class="dash-progress">
                <div class="dash-fill dash-fill-ram" id="ram-bar" style="width:0%"></div>
            </div>
        </div>

        <!-- UPTIME DASH CARD -->
        <div class="dash-card">
            <div class="dash-card-body">
                <div class="dash-card-label">Server Uptime</div>
                <div class="dash-card-value" id="uptime-val">—</div>
            </div>
        </div>

        <!-- ROOT FOLDER DASH CARD -->
        <div class="dash-card">
            <div class="dash-card-body">
                <div class="dash-card-label">Library Size</div>
                <div class="dash-card-value" id="storage-val">—</div>
                <div class="dash-card-sub" id="storage-sub"></div>
            </div>
        </div>

        <div class="dash-card">
            <div class="dash-card-body">
                <div class="dash-card-label">Disk Storage</div>
                <div class="dash-card-value" id="disk-val">—</div> <!-- Changed ID -->
                <div class="dash-card-sub" id="disk-sub"></div>    <!-- Changed ID -->
            </div>
            <!-- STORAGE CAPACITY DASH CARD -->
            <div class="dash-progress">
                <div class="dash-fill" id="disk-bar" style="width:0%; background-color: #22c55e;"></div>
            </div>
        </div>

    </div>

    <!-- ACTIVE CONNECTIONS -->
    <h2 class="dash-section-title">
        Active Streams
        <span class="dash-count" id="viewer-count">0</span>
    </h2>

    <div class="dash-table-wrap" style="margin-bottom: 32px;">
        <table class="dash-table">
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>File ID</th>
                    <th>Latency</th>
                </tr>
            </thead>
            <tbody id="viewers-tbody">
                <tr class="dash-empty-row"><td colspan="3">No active streams</td></tr>
            </tbody>
        </table>
    </div>

    <!-- ACTIVITY LOG -->
    <div class="dash-section-header">
        <h2 class="dash-section-title" style="margin:0;">
            Activity Log
            <span class="dash-count" id="log-count">0</span>
        </h2>
        <a class="action-btn download-btn" href="{{ url_for('dashboard.logs_dump') }}">
            ⬇ Dump Log
        </a>
    </div>

    <div class="dash-table-wrap">
        <table class="dash-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>IP</th>
                    <th>Action</th>
                    <th>Path / File</th>
                    <th>Handler</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="logs-tbody">
                <tr class="dash-empty-row"><td colspan="6">Waiting for events…</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
function formatUptime(s) {
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    return `${d}d ${h}h ${m}m`;
}

function timeAgo(ts) {
    const s = Math.floor(Date.now() / 1000) - ts;
    if (s < 5)  return 'Just now';
    if (s < 60) return `${s}s ago`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}m ago`;
    return `${Math.floor(m / 60)}h ago`;
}

function badgeClass(action, result) {
    if (action === 'Delete')  return 'dash-badge-fail';
    if (action === 'Login' && result !== 'Success') return 'dash-badge-fail';
    if (action === 'Download' || action === 'Stream') return 'dash-badge-info';
    return 'dash-badge-ok';
}

function hrBytes(bytes) {
    const units = ['B','KB','MB','GB'];
    let v = bytes;
    for (const u of units) {
        if (v < 1024) return `${v.toFixed(v < 10 ? 1 : 0)} ${u}`;
        v /= 1024;
    }
    return `${v.toFixed(1)} TB`;
}

function update() {
    fetch('/api/stats')
        .then(r => r.json())
        .then(d => {
            const sys = d.system;

            // CPU (LocalShare process, % of total capacity)
            document.getElementById('cpu-val').textContent = `${sys.cpu}%`;
            document.getElementById('cpu-bar').style.width = `${Math.min(sys.cpu, 100)}%`;

            // RAM (LocalShare RSS vs system total)
            const ramUsed  = hrBytes(sys.ram_used);
            const ramTotal = (sys.ram_total / 1073741824).toFixed(1);
            const ramPerc  = sys.ram_total > 0
                ? ((sys.ram_used / sys.ram_total) * 100)
                : 0;

            document.getElementById('ram-val').textContent = ramUsed;
            document.getElementById('ram-sub').textContent = `of ${ramTotal} GB system RAM`;
            // Scale bar: process rarely exceeds 5% of system RAM so multiply for visibility,
            // but cap at 100% if it ever does.
            document.getElementById('ram-bar').style.width = `${Math.min(ramPerc, 100).toFixed(2)}%`;

            // Uptime
            document.getElementById('uptime-val').textContent = formatUptime(sys.uptime);

            // Storage
            document.getElementById('storage-val').textContent = d.storage.used_hr;
            document.getElementById('storage-sub').textContent = `${d.storage.files} files`;

            // Disk Capatity
            document.getElementById('disk-val').textContent = `${d.storage.free_hr} free`;
            document.getElementById('disk-sub').textContent = `of ${d.storage.total_hr} total disk`;
            document.getElementById('disk-bar').style.width = `${d.storage.percent}%`;

            // Viewers
            document.getElementById('viewer-count').textContent = d.viewers.length;
            const vBody = document.getElementById('viewers-tbody');
            vBody.innerHTML = d.viewers.length === 0
                ? '<tr class="dash-empty-row"><td colspan="3">No active streams</td></tr>'
                : d.viewers.map(v => `
                    <tr>
                        <td class="dash-mono">${v.ip}</td>
                        <td>#${v.file_id}</td>
                        <td>${v.latency} ms</td>
                    </tr>`).join('');

            // Logs
            document.getElementById('log-count').textContent = d.logs.length;
            const lBody = document.getElementById('logs-tbody');
            lBody.innerHTML = d.logs.length === 0
                ? '<tr class="dash-empty-row"><td colspan="6">Waiting for events…</td></tr>'
                : d.logs.map(l => `
                    <tr>
                        <td class="dash-muted">${timeAgo(l.time)}</td>
                        <td class="dash-mono">${l.ip}</td>
                        <td><span class="dash-badge ${badgeClass(l.action, l.result)}">${l.action}</span></td>
                        <td class="dash-path" title="${l.path}">${l.path}</td>
                        <td class="dash-mono dash-muted">${l.func}</td>
                        <td>${l.result}</td>
                    </tr>`).join('');
        })
        .catch(e => console.error('Stats fetch error:', e));
}

update();
setInterval(update, 2000);
</script>

</body>
</html>
