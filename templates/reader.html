<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reader – LocalShare</title>
    <style>
        :root {
            --bg-color: #000;
            --overlay-bg: rgba(20, 24, 29, 0.94);
            --accent: #59c1ff;
            --text-main: #e6e6e6;
            --text-muted: #9aa4b2;
            --border-color: #2c3440;
            --rail-bg: #2a313d;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---------- OVERLAYS ---------- */
        .ui-overlay {
            position: fixed;
            left: 0;
            right: 0;
            background: var(--overlay-bg);
            z-index: 100;
            transition: transform 0.25s ease, opacity 0.25s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .top-bar {
            top: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .bottom-bar {
            bottom: 0;
            display: flex;
            flex-direction: column;
            padding: 14px 18px 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.4);
            gap: 14px;
        }

        /* Hide logic */
        body.ui-hidden .top-bar { transform: translateY(-100%); opacity: 0; }
        body.ui-hidden .bottom-bar { transform: translateY(100%); opacity: 0; }

        /* ---------- TOP BAR CONTENT ---------- */
        .top-bar a.back-btn {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
            flex-shrink: 0;
        }
        .top-bar a.back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
        }
        .top-bar a.back-btn:active {
            transform: scale(0.95);
        }

        .top-bar .title-box {
            text-align: center;
            flex: 1;
            padding: 0 16px;
            overflow: hidden;
        }
        .top-bar .title { 
            font-weight: 600; 
            font-size: 0.95rem; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .top-bar .progress-text { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin-top: 2px; 
        }

        .top-bar-spacer {
            width: 36px;
            flex-shrink: 0;
        }

        /* ---------- BOTTOM BAR & SLIDER ---------- */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 14px;
            font-variant-numeric: tabular-nums;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 6px;
            border-radius: 3px;
            outline: none;
            background: var(--rail-bg);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            margin: 0;
        }

        /* Webkit Thumb (Chrome/Safari/Edge) */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0, 0, 0, 0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover,
        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
            box-shadow: 0 0 0 3px var(--accent), 0 0 12px rgba(89, 193, 255, 0.6);
        }

        /* Firefox Thumb */
        input[type="range"]::-moz-range-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0, 0, 0, 0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        input[type="range"]::-moz-range-thumb:hover,
        input[type="range"]::-moz-range-thumb:active {
            transform: scale(1.2);
            box-shadow: 0 0 0 3px var(--accent), 0 0 12px rgba(89, 193, 255, 0.6);
        }

        .toolbar {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .tool-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: color 0.2s;
        }
        .tool-btn:hover { color: var(--accent); }
        .tool-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* ---------- READER MODES ---------- */
        #reader-container {
            width: 100%;
            min-height: 100vh;
        }

        /* Paged Mode — slide track */
        .reader-paged {
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .slide-track {
            display: flex;
            height: 100%;
            width: 300%;
            transform: translateX(-33.3333%);
            will-change: transform;
        }

        .slide-track.animating {
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide-slot {
            width: 33.3333%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .slide-slot img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        /* Vertical Modes */
        .reader-vertical { padding: 0; }
        .reader-vertical-gaps { padding: 0; background: #111; }
        
        .vert-page-wrapper {
            width: 100%;
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reader-vertical-gaps .vert-page-wrapper { margin-bottom: 12px; }
        .vert-page-wrapper img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* ---------- BOTTOM SHEET ---------- */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 199;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sheet-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0; right: 0;
            background: #1b1f24;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 24px;
            z-index: 200;
            transition: bottom 0.3s cubic-bezier(0.1, 0.8, 0.3, 1);
            box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
        }
        .bottom-sheet.show { bottom: 0; }
        .sheet-title { margin: 0 0 16px; font-size: 1.1rem; color: var(--text-main); }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        .mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 12px;
            background: #111315;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .mode-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2;}
        .mode-btn.active {
            background: rgba(89, 193, 255, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body class="ui-visible">

    <!-- OVERLAYS -->
    <div class="ui-overlay top-bar">
        <a href="{{ url_for('files.browse', path=folder) }}" class="back-btn" title="Back">←</a>
        
        <div class="title-box">
            {% set folder_display = (folder.replace('\\', '/').split('/') | reject('equalto', '') | list)[-1] if folder else 'Root' %}
            <div class="title">{{ folder_display }}</div>
            <div class="progress-text" id="topbar-progress">1 / {{ images|length }}</div>
        </div>

        <div class="top-bar-spacer"></div>
    </div>

    <div class="ui-overlay bottom-bar">
        <div class="slider-row">
            <span id="page-current">1</span>
            <input type="range" id="page-slider" min="0" max="{{ images|length - 1 }}" value="0">
            <span id="page-total">{{ images|length }}</span>
        </div>
        <div class="toolbar">
            <button class="tool-btn" id="btn-open-modes">
                <svg viewBox="0 0 24 24">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Reading mode</span>
            </button>
        </div>
    </div>

    <!-- READER AREA -->
    <div id="reader-container"></div>

    <!-- SETTINGS BOTTOM SHEET -->
    <div id="sheet-overlay" class="sheet-overlay"></div>
    <div id="reading-mode-sheet" class="bottom-sheet">
        <h3 class="sheet-title">Reading mode</h3>
        <div class="mode-grid">
            <button class="mode-btn" data-mode="ltr">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 12l3-3m0 0l-3-3m3 3H9"/></svg>
                <span>Paged<br>(left to right)</span>
            </button>
            <button class="mode-btn" data-mode="rtl">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18M9 12l-3-3m0 0l3-3m-3 3h6"/></svg>
                <span>Paged<br>(right to left)</span>
            </button>
            <button class="mode-btn" data-mode="vertical">
                <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M12 9v6m0 0l-3-3m3 3l3-3"/></svg>
                <span>Long strip</span>
            </button>
            <button class="mode-btn" data-mode="vertical-gaps">
                <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="8" rx="1"/><rect x="5" y="14" width="14" height="8" rx="1"/><path d="M12 10v4"/></svg>
                <span>Long strip<br>with gaps</span>
            </button>
        </div>
    </div>

<script>
    // System Data Injection
    const imagesData = [
        {% for image in images %}
        "{{ url_for('files.raw_file', file_id=image.file_id) }}",
        {% endfor %}
    ];

    // State & Persistence Key
    const STORAGE_KEY = 'reader-state-' + window.location.pathname + window.location.search;
    
    let savedState = {};
    try {
        savedState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch(e) {}

    let mode = savedState.mode || 'ltr';
    let currentIndex = parseInt(savedState.page, 10);

    // Validate bounds for loaded gallery
    if (isNaN(currentIndex) || currentIndex < 0 || currentIndex >= imagesData.length) {
        currentIndex = 0;
    }

    let uiVisible = true;
    let sliderAnimFrame = null;
    
    // DOM Elements
    const readerContainer = document.getElementById('reader-container');
    const pageSlider = document.getElementById('page-slider');
    const pageCurrent = document.getElementById('page-current');
    const topbarProgress = document.getElementById('topbar-progress');
    const sheetOverlay = document.getElementById('sheet-overlay');
    const readingModeSheet = document.getElementById('reading-mode-sheet');

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            mode: mode,
            page: currentIndex
        }));
    }

    // ---------------- UI & TOGGLES ----------------
    function toggleUI() {
        uiVisible = !uiVisible;
        document.body.classList.toggle('ui-hidden', !uiVisible);
    }

    function closeSheet() {
        sheetOverlay.classList.remove('show');
        readingModeSheet.classList.remove('show');
    }

    document.getElementById('btn-open-modes').addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        sheetOverlay.classList.add('show');
        readingModeSheet.classList.add('show');
    });

    sheetOverlay.addEventListener('click', closeSheet);

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            mode = e.currentTarget.dataset.mode;
            saveState();
            closeSheet();
            renderView();
        });
    });

    // ---------------- NAVIGATION & ANIMATED SLIDER ----------------
    function updateControls(animate = true) {
        pageCurrent.textContent = currentIndex + 1;
        topbarProgress.textContent = `${currentIndex + 1} / ${imagesData.length}`;
        saveState();
        
        if (animate) {
            animateSliderTo(currentIndex);
        } else {
            if (sliderAnimFrame) cancelAnimationFrame(sliderAnimFrame);
            pageSlider.value = currentIndex;
            updateSliderRailFill();
        }
    }

    function updateSliderRailFill() {
        const min = parseFloat(pageSlider.min) || 0;
        const max = parseFloat(pageSlider.max) || 1;
        const val = parseFloat(pageSlider.value);
        const percent = max > min ? ((val - min) / (max - min)) * 100 : 0;
        
        pageSlider.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${percent}%, var(--rail-bg) ${percent}%, var(--rail-bg) 100%)`;
    }

    function animateSliderTo(targetVal) {
        if (sliderAnimFrame) cancelAnimationFrame(sliderAnimFrame);
        
        const startVal = parseFloat(pageSlider.value);
        const diff = targetVal - startVal;
        
        if (Math.abs(diff) < 0.02) {
            pageSlider.value = targetVal;
            updateSliderRailFill();
            return;
        }

        const startTime = performance.now();
        const duration = 220; // 220ms smooth ease-out

        function step(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // Cubic ease-out
            const ease = 1 - Math.pow(1 - progress, 3);
            
            pageSlider.value = startVal + (diff * ease);
            updateSliderRailFill();

            if (progress < 1) {
                sliderAnimFrame = requestAnimationFrame(step);
            } else {
                pageSlider.value = targetVal;
                updateSliderRailFill();
            }
        }

        sliderAnimFrame = requestAnimationFrame(step);
    }

    // ---------------- PAGED SLIDE TRACK ----------------
    let slideTrack = null;
    let slotImgs   = [];
    let isSliding  = false;

    function buildSlideTrack() {
        readerContainer.className = 'reader-paged';
        readerContainer.innerHTML = '';
        slideTrack = document.createElement('div');
        slideTrack.className = 'slide-track';
        slotImgs = [];
        for (let i = 0; i < 3; i++) {
            const slot = document.createElement('div');
            slot.className = 'slide-slot';
            const img = document.createElement('img');
            slot.appendChild(img);
            slideTrack.appendChild(slot);
            slotImgs.push(img);
        }
        readerContainer.appendChild(slideTrack);
        fillSlots();
    }

    function fillSlots() {
        // In LTR: slot 0 = index-1 (prev), slot 1 = current, slot 2 = index+1 (next)
        // In RTL: slot 0 = index+1 (prev in reading order), slot 2 = index-1 (next in reading order)
        if (mode === 'rtl') {
            const prev = currentIndex + 1;
            const next = currentIndex - 1;
            slotImgs[0].src = (prev < imagesData.length) ? imagesData[prev] : '';
            slotImgs[1].src = imagesData[currentIndex];
            slotImgs[2].src = (next >= 0) ? imagesData[next] : '';
        } else {
            const prev = currentIndex - 1;
            const next = currentIndex + 1;
            slotImgs[0].src = (prev >= 0) ? imagesData[prev] : '';
            slotImgs[1].src = imagesData[currentIndex];
            slotImgs[2].src = (next < imagesData.length) ? imagesData[next] : '';
        }
        slideTrack.classList.remove('animating');
        slideTrack.style.transform = 'translateX(-33.3333%)';
    }

    function slideTo(direction) {
        if (isSliding) return;
        const newIndex = currentIndex + direction;
        if (newIndex < 0 || newIndex >= imagesData.length) return;
        isSliding = true;
        // LTR + going to higher index → track slides left; RTL reverses physical direction
        const goLeft = (direction === 1 && mode === 'ltr') || (direction === -1 && mode === 'rtl');
        slideTrack.classList.add('animating');
        slideTrack.style.transform = goLeft ? 'translateX(-66.6666%)' : 'translateX(0%)';
        slideTrack.addEventListener('transitionend', () => {
            currentIndex = newIndex;
            fillSlots();
            updateControls(true);
            preloadPagedImages();
            isSliding = false;
        }, { once: true });
    }

    // Touch swipe for paged modes
    let touchStartX = 0, touchStartY = 0;
    readerContainer.addEventListener('touchstart', e => {
        if (mode.startsWith('vertical')) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    readerContainer.addEventListener('touchend', e => {
        if (mode.startsWith('vertical')) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5) {
            // Swipe left = forward reading direction, swipe right = backward
            navigate((dx < 0 ? 1 : -1) * (mode === 'ltr' ? 1 : -1));
        }
    }, { passive: true });

    // ---------------- NAVIGATION ----------------
    function navigate(direction) {
        if (mode.startsWith('vertical')) {
            let newIndex = currentIndex + direction;
            if (newIndex < 0) newIndex = 0;
            if (newIndex >= imagesData.length) newIndex = imagesData.length - 1;
            if (newIndex !== currentIndex) scrollToVerticalPage(newIndex);
        } else {
            slideTo(direction);
        }
    }

    // Manual slider drag — jump instantly without slide animation
    pageSlider.addEventListener('input', (e) => {
        if (sliderAnimFrame) cancelAnimationFrame(sliderAnimFrame);
        
        currentIndex = parseInt(e.target.value);
        pageCurrent.textContent = currentIndex + 1;
        topbarProgress.textContent = `${currentIndex + 1} / ${imagesData.length}`;
        updateSliderRailFill();
        saveState();
        
        if (mode.startsWith('vertical')) {
            scrollToVerticalPage(currentIndex);
        } else {
            if (slideTrack && readerContainer.contains(slideTrack)) fillSlots();
            preloadPagedImages();
        }
    });

    // ---------------- CORE RENDER & PRELOAD ----------------
    function renderView(animateSlider = true) {
        updateControls(animateSlider);

        if (mode.startsWith('vertical')) {
            if (readerContainer.className !== `reader-${mode}`) {
                readerContainer.className = `reader-${mode}`;
                readerContainer.innerHTML = '';
                
                imagesData.forEach((src, idx) => {
                    const div = document.createElement('div');
                    div.className = 'vert-page-wrapper';
                    div.id = `page-wrapper-${idx}`;
                    const img = document.createElement('img');
                    img.id = `vert-img-${idx}`;
                    div.appendChild(img);
                    readerContainer.appendChild(div);
                });
                
                setTimeout(() => scrollToVerticalPage(currentIndex), 50);
            } else {
                loadVerticalImages();
            }
        } else {
            if (!slideTrack || !readerContainer.contains(slideTrack)) {
                buildSlideTrack();
            } else {
                fillSlots();
            }
            preloadPagedImages();
        }
    }

    // Dynamic preloading (-1 behind, +3 ahead)
    function loadVerticalImages() {
        for (let i = 0; i < imagesData.length; i++) {
            if (i >= currentIndex - 1 && i <= currentIndex + 3) {
                const img = document.getElementById(`vert-img-${i}`);
                if (img && !img.src) img.src = imagesData[i];
            }
        }
    }

    function preloadPagedImages() {
        window._preloads = window._preloads || [];
        window._preloads.length = 0; 
        
        for (let i = currentIndex - 1; i <= currentIndex + 3; i++) {
            if (i >= 0 && i < imagesData.length && i !== currentIndex) {
                let img = new Image();
                img.src = imagesData[i];
                window._preloads.push(img);
            }
        }
    }

    function scrollToVerticalPage(index) {
        currentIndex = index;
        loadVerticalImages();
        setTimeout(() => {
            const target = document.getElementById(`page-wrapper-${index}`);
            if (target) target.scrollIntoView({ behavior: 'auto' });
        }, 10);
    }

    // ---------------- EVENT LISTENERS ----------------
    readerContainer.addEventListener('click', (e) => {
        if (mode.startsWith('vertical')) {
            toggleUI();
            return;
        }
        
        const width = window.innerWidth;
        const x = e.clientX;
        
        if (x < width * 0.33) {
            navigate(mode === 'ltr' ? -1 : 1);
        } else if (x > width * 0.66) {
            navigate(mode === 'ltr' ? 1 : -1);
        } else {
            toggleUI();
        }
    });

    document.addEventListener('keydown', e => {
        if (mode.startsWith('vertical')) return; 
        if (e.key === 'ArrowRight') navigate(mode === 'ltr' ? 1 : -1);
        if (e.key === 'ArrowLeft')  navigate(mode === 'ltr' ? -1 : 1);
    });

    let scrollTimeout;
    window.addEventListener('scroll', () => {
        if (!mode.startsWith('vertical')) return;
        if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
        
        scrollTimeout = requestAnimationFrame(() => {
            let closestDist = Infinity;
            let closestIdx = currentIndex;
            
            document.querySelectorAll('.vert-page-wrapper').forEach((wrapper, i) => {
                const dist = Math.abs(wrapper.getBoundingClientRect().top);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestIdx = i;
                }
            });
            
            if (closestIdx !== currentIndex) {
                currentIndex = closestIdx;
                updateControls(true);
                loadVerticalImages();
            }
        });
    });

    // Init
    renderView(false);
    setTimeout(() => { if (uiVisible) toggleUI(); }, 2500);
</script>
</body>
</html>
