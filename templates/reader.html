<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reader – LocalShare</title>
    <style>
        :root {
            --bg-color: #000;
            --overlay-bg: rgba(27, 31, 36, 0.95);
            --accent: #59c1ff;
            --text-main: #e6e6e6;
            --text-muted: #9aa4b2;
            --border-color: #2c3440;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---------- OVERLAYS ---------- */
        .ui-overlay {
            position: fixed;
            left: 0;
            right: 0;
            background: var(--overlay-bg);
            z-index: 100;
            transition: transform 0.25s ease, opacity 0.25s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .top-bar {
            top: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .bottom-bar {
            bottom: 0;
            display: flex;
            flex-direction: column;
            padding: 12px 16px 24px;
            border-top: 1px solid var(--border-color);
            gap: 16px;
        }

        /* Hide logic */
        body.ui-hidden .top-bar { transform: translateY(-100%); opacity: 0; }
        body.ui-hidden .bottom-bar { transform: translateY(100%); opacity: 0; }

        /* ---------- TOP BAR CONTENT ---------- */
        .top-bar a.back-btn {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar .title-box {
            text-align: center;
            flex: 1;
            padding: 0 16px;
        }
        .top-bar .title { font-weight: 600; font-size: 0.95rem; }
        .top-bar .progress-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        /* ---------- BOTTOM BAR CONTENT ---------- */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-variant-numeric: tabular-nums;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            background: transparent;
            height: 24px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(89, 193, 255, 0.4);
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border-color);
            border-radius: 2px;
        }

        .toolbar {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .tool-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: color 0.2s;
        }
        .tool-btn:hover { color: var(--accent); }
        .tool-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* ---------- READER MODES ---------- */
        #reader-container {
            width: 100%;
            min-height: 100vh;
        }

        /* Paged Mode */
        .reader-paged {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .reader-paged img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Vertical Modes */
        .reader-vertical { padding: 0; }
        .reader-vertical-gaps { padding: 0; background: #111; }
        
        .vert-page-wrapper {
            width: 100%;
            min-height: 50vh; /* Prevents extreme layout shifts before images load */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reader-vertical-gaps .vert-page-wrapper { margin-bottom: 12px; }
        .vert-page-wrapper img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* ---------- BOTTOM SHEET ---------- */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 199;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sheet-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0; right: 0;
            background: #1b1f24;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 24px;
            z-index: 200;
            transition: bottom 0.3s cubic-bezier(0.1, 0.8, 0.3, 1);
            box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
        }
        .bottom-sheet.show { bottom: 0; }
        .sheet-title { margin: 0 0 16px; font-size: 1.1rem; color: var(--text-main); }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        .mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 12px;
            background: #111315;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .mode-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2;}
        .mode-btn.active {
            background: rgba(89, 193, 255, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

    </style>
</head>
<body class="ui-visible">

    <!-- OVERLAYS -->
    <div class="ui-overlay top-bar">
        <a href="{{ url_for('files.browse', path=folder) }}" class="back-btn">←</a>
        <div class="title-box">
            <div class="title">{{ folder or 'Root' }}</div>
            <div class="progress-text" id="topbar-progress">1 / {{ images|length }}</div>
        </div>
        <div style="width: 24px;"></div> <!-- Spacer for flex alignment -->
    </div>

    <div class="ui-overlay bottom-bar">
        <div class="slider-row">
            <span id="page-current">1</span>
            <input type="range" id="page-slider" min="0" max="{{ images|length - 1 }}" value="0">
            <span id="page-total">{{ images|length }}</span>
        </div>
        <div class="toolbar">
            <button class="tool-btn" id="btn-open-modes">
                <svg viewBox="0 0 24 24">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Reading mode</span>
            </button>
        </div>
    </div>

    <!-- READER AREA -->
    <div id="reader-container"></div>

    <!-- SETTINGS BOTTOM SHEET -->
    <div id="sheet-overlay" class="sheet-overlay"></div>
    <div id="reading-mode-sheet" class="bottom-sheet">
        <h3 class="sheet-title">Reading mode</h3>
        <div class="mode-grid">
            <button class="mode-btn" data-mode="ltr">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 12l3-3m0 0l-3-3m3 3H9"/></svg>
                <span>Paged<br>(left to right)</span>
            </button>
            <button class="mode-btn" data-mode="rtl">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18M9 12l-3-3m0 0l3-3m-3 3h6"/></svg>
                <span>Paged<br>(right to left)</span>
            </button>
            <button class="mode-btn" data-mode="vertical">
                <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M12 9v6m0 0l-3-3m3 3l3-3"/></svg>
                <span>Long strip</span>
            </button>
            <button class="mode-btn" data-mode="vertical-gaps">
                <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="8" rx="1"/><rect x="5" y="14" width="14" height="8" rx="1"/><path d="M12 10v4"/></svg>
                <span>Long strip<br>with gaps</span>
            </button>
        </div>
    </div>

<script>
    // System Data Injection
    const imagesData = [
        {% for image in images %}
        "{{ url_for('files.raw_file', file_id=image.file_id) }}",
        {% endfor %}
    ];

    // State
    const STORAGE_KEY = 'reader-settings-' + window.location.pathname + window.location.search;
    let mode = localStorage.getItem(STORAGE_KEY) || 'ltr';
    let currentIndex = 0;
    let uiVisible = true;
    
    // DOM Elements
    const readerContainer = document.getElementById('reader-container');
    const pageSlider = document.getElementById('page-slider');
    const pageCurrent = document.getElementById('page-current');
    const topbarProgress = document.getElementById('topbar-progress');
    const sheetOverlay = document.getElementById('sheet-overlay');
    const readingModeSheet = document.getElementById('reading-mode-sheet');

    // ---------------- UI & TOGGLES ----------------
    function toggleUI() {
        uiVisible = !uiVisible;
        document.body.classList.toggle('ui-hidden', !uiVisible);
    }

    function closeSheet() {
        sheetOverlay.classList.remove('show');
        readingModeSheet.classList.remove('show');
    }

    document.getElementById('btn-open-modes').addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        sheetOverlay.classList.add('show');
        readingModeSheet.classList.add('show');
    });

    sheetOverlay.addEventListener('click', closeSheet);

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            mode = e.currentTarget.dataset.mode;
            localStorage.setItem(STORAGE_KEY, mode);
            closeSheet();
            renderView();
        });
    });

    // ---------------- NAVIGATION LOGIC ----------------
    function updateControls() {
        pageSlider.value = currentIndex;
        pageCurrent.textContent = currentIndex + 1;
        topbarProgress.textContent = `${currentIndex + 1} / ${imagesData.length}`;
    }

    function navigate(direction) {
        let newIndex = currentIndex + direction;
        if (newIndex < 0) newIndex = 0;
        if (newIndex >= imagesData.length) newIndex = imagesData.length - 1;
        
        if (newIndex !== currentIndex) {
            currentIndex = newIndex;
            if (mode.startsWith('vertical')) {
                scrollToVerticalPage(currentIndex);
            } else {
                renderView();
            }
        }
    }

    pageSlider.addEventListener('input', (e) => {
        currentIndex = parseInt(e.target.value);
        if (mode.startsWith('vertical')) {
            scrollToVerticalPage(currentIndex);
        } else {
            renderView();
        }
    });

    // ---------------- CORE RENDER & PRELOAD ----------------
    function renderView() {
        updateControls();

        if (mode.startsWith('vertical')) {
            // Setup DOM structure for vertical scrolling if not present
            if (readerContainer.className !== `reader-${mode}`) {
                readerContainer.className = `reader-${mode}`;
                readerContainer.innerHTML = '';
                
                imagesData.forEach((src, idx) => {
                    const div = document.createElement('div');
                    div.className = 'vert-page-wrapper';
                    div.id = `page-wrapper-${idx}`;
                    const img = document.createElement('img');
                    img.id = `vert-img-${idx}`;
                    div.appendChild(img);
                    readerContainer.appendChild(div);
                });
                
                setTimeout(() => scrollToVerticalPage(currentIndex), 50);
            } else {
                loadVerticalImages();
            }
        } else {
            // Paged LTR or RTL
            readerContainer.className = 'reader-paged';
            readerContainer.innerHTML = '';
            
            const img = document.createElement('img');
            img.src = imagesData[currentIndex];
            readerContainer.appendChild(img);

            preloadPagedImages();
        }
    }

    // Load strict window of images (1 behind, 3 ahead)
    function loadVerticalImages() {
        for (let i = 0; i < imagesData.length; i++) {
            if (i >= currentIndex - 1 && i <= currentIndex + 3) {
                const img = document.getElementById(`vert-img-${i}`);
                if (img && !img.src) img.src = imagesData[i];
            }
        }
    }

    function preloadPagedImages() {
        // Keeps references so the browser caches them
        window._preloads = window._preloads || [];
        window._preloads.length = 0; 
        
        for (let i = currentIndex - 1; i <= currentIndex + 3; i++) {
            if (i >= 0 && i < imagesData.length && i !== currentIndex) {
                let img = new Image();
                img.src = imagesData[i];
                window._preloads.push(img);
            }
        }
    }

    function scrollToVerticalPage(index) {
        currentIndex = index;
        loadVerticalImages(); // Ensure the target image has a src
        setTimeout(() => {
            const target = document.getElementById(`page-wrapper-${index}`);
            if (target) target.scrollIntoView({ behavior: 'auto' });
        }, 10);
    }

    // ---------------- EVENT LISTENERS ----------------
    
    // Tap Zones
    readerContainer.addEventListener('click', (e) => {
        if (mode.startsWith('vertical')) {
            toggleUI();
            return;
        }
        
        const width = window.innerWidth;
        const x = e.clientX;
        
        if (x < width * 0.33) {
            navigate(mode === 'ltr' ? -1 : 1);
        } else if (x > width * 0.66) {
            navigate(mode === 'ltr' ? 1 : -1);
        } else {
            toggleUI();
        }
    });

    // Keyboard controls
    document.addEventListener('keydown', e => {
        if (mode.startsWith('vertical')) return; 
        if (e.key === 'ArrowRight') navigate(mode === 'ltr' ? 1 : -1);
        if (e.key === 'ArrowLeft')  navigate(mode === 'ltr' ? -1 : 1);
    });

    // Track scroll to update current index and lazy load ahead
    let scrollTimeout;
    window.addEventListener('scroll', () => {
        if (!mode.startsWith('vertical')) return;
        if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
        
        scrollTimeout = requestAnimationFrame(() => {
            let closestDist = Infinity;
            let closestIdx = currentIndex;
            
            document.querySelectorAll('.vert-page-wrapper').forEach((wrapper, i) => {
                const dist = Math.abs(wrapper.getBoundingClientRect().top);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestIdx = i;
                }
            });
            
            if (closestIdx !== currentIndex) {
                currentIndex = closestIdx;
                updateControls();
                loadVerticalImages();
            }
        });
    });

    // Init
    renderView();
    // Auto-hide UI after 2.5 seconds on initial load to match mobile reader conventions
    setTimeout(() => { if (uiVisible) toggleUI(); }, 2500);

</script>
</body>
</html>
